<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhys Wu</title>
    <link rel="shortcut icon" href="logo.jpg">
    <meta name="keywords" content="Rui Wu, BarryRun, AI Agent, LLM, RAG, multimodal agent">
    <meta name="description" content="Rui Wu's personal homepage.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #fbfbf7;
            --ink: #111111;
            --muted: #5f5d58;
            --line: #d9d5ca;
            --accent: #0f766e;
            --measure: 680px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background: var(--bg);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 17px;
            line-height: 1.7;
            text-rendering: optimizeLegibility;
            display: grid;
            place-items: center;
        }

        a {
            color: var(--ink);
            text-decoration-color: var(--line);
            text-decoration-thickness: 1px;
            text-underline-offset: 0.18em;
        }

        a:hover {
            color: var(--accent);
            text-decoration-color: var(--accent);
        }

        .page {
            width: min(var(--measure), calc(100% - 44px));
            margin: 0 auto;
            padding: 42px 0;
        }

        .portrait {
            width: 116px;
            height: 116px;
            display: block;
            object-fit: cover;
            border-radius: 3px;
            border: 1px solid var(--line);
            margin-bottom: 26px;
        }

        .identity {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .identity .portrait {
            flex: 0 0 auto;
            margin-bottom: 0;
        }

        .identity-text {
            min-width: 0;
        }

        h1 {
            margin: 0;
            font-family: "Source Serif 4", Georgia, serif;
            font-size: clamp(3.1rem, 12vw, 5.6rem);
            font-weight: 700;
            line-height: 0.96;
            letter-spacing: 0;
        }

        .alias {
            margin: 15px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .bio {
            max-width: 650px;
            margin: 22px 0 0;
            color: var(--muted);
            font-size: 1.06rem;
        }

        .bio strong {
            color: var(--ink);
            font-weight: 600;
        }

        .links,
        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 18px;
            margin: 23px 0 0;
            padding: 0;
            list-style: none;
            font-size: 0.98rem;
        }

        .links {
            gap: 12px;
            margin-top: 28px;
        }

        .links a {
            display: inline-flex;
            width: 32px;
            height: 32px;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            text-decoration: none;
        }

        .links svg {
            width: 21px;
            height: 21px;
            display: block;
        }

        .links a:hover {
            color: var(--accent);
        }

        .nav {
            padding-top: 22px;
            border-top: 1px solid var(--line);
        }

        .nav a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 128px;
            padding: 8px 16px;
            border: 1px solid var(--line);
            border-radius: 999px;
            text-decoration: none;
            color: var(--ink);
        }

        .nav a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        @media (max-width: 560px) {
            body {
                font-size: 16px;
                place-items: start center;
            }

            .identity {
                gap: 18px;
            }

            .portrait {
                width: 96px;
                height: 96px;
            }

            .links,
            .nav {
                gap: 7px 15px;
            }
        }
    </style>
</head>
